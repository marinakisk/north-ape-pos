<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>North Ape — Kitchen Display</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06100A;--s1:#0D1A10;--s2:#142018;--bd:rgba(80,160,80,.15);--ac:#6DBF5A;--ac2:#4E9940;--tx:#E8F0E0;--mt:#5A7050;--dn:#E05C5C;--or:#E09A3A;--bl:#3A8FD5;--wm:#C8A84B;--new:#6DBF5A;--mid:#E09A3A;--old:#E05C5C}
html,body{background:var(--bg);color:var(--tx);font-family:sans-serif;height:100vh;overflow:hidden}

/* LOGIN */
#login{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.lbrand{font-size:2rem;font-weight:900;color:var(--ac);letter-spacing:4px}
.lsub{font-size:.8rem;color:var(--mt);letter-spacing:2px;text-transform:uppercase}
.lcard{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:24px;width:300px;text-align:center}
.lcard h2{font-size:.9rem;color:var(--mt);margin-bottom:14px;text-transform:uppercase;letter-spacing:2px}
.pdisp{font-size:2.2rem;letter-spacing:8px;color:var(--ac);margin-bottom:14px;height:40px;font-weight:900}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.pb{background:var(--s2);border:1px solid var(--bd);border-radius:9px;padding:14px;font-size:1.2rem;font-weight:600;cursor:pointer}
.pb:active,.pb:hover{background:var(--ac);color:#051005}
.pbclr{color:var(--dn)}
.pbok{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#051005;border-color:transparent}

/* KDS SHELL */
#kds{display:none;height:100vh;flex-direction:column}
#kds.on{display:flex}
#kdstop{background:rgba(6,16,10,.98);border-bottom:1px solid var(--bd);padding:0 16px;height:52px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.kbrand{font-size:1.1rem;font-weight:900;color:var(--ac);letter-spacing:2px}
.kcounts{display:flex;gap:8px;margin-left:auto}
.kcount{padding:4px 12px;border-radius:20px;font-size:.72rem;font-weight:700}
.kc-new{background:rgba(100,190,80,.15);color:var(--ac);border:1px solid rgba(100,190,80,.3)}
.kc-mid{background:rgba(224,154,58,.15);color:var(--or);border:1px solid rgba(224,154,58,.3)}
.kc-old{background:rgba(224,92,92,.15);color:var(--dn);border:1px solid rgba(224,92,92,.3)}
.ktime{font-size:1rem;color:var(--mt);letter-spacing:2px;margin-left:12px}
.kout{background:transparent;border:1px solid rgba(224,92,92,.3);border-radius:7px;padding:4px 10px;color:var(--dn);font-size:.72rem;cursor:pointer}
.ksound{background:transparent;border:1px solid var(--bd);border-radius:7px;padding:4px 10px;color:var(--mt);font-size:.72rem;cursor:pointer}
.ksound.on{border-color:var(--ac);color:var(--ac)}

#kboard{flex:1;overflow-y:auto;padding:12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;align-content:start}

/* ORDER CARD */
.kcard{background:var(--s1);border:2px solid var(--bd);border-radius:14px;display:flex;flex-direction:column;overflow:hidden;transition:border-color .3s}
.kcard.fresh{border-color:var(--new);animation:popIn .3s ease}
.kcard.mid{border-color:var(--mid)}
.kcard.old{border-color:var(--old);animation:pulse 1.5s infinite}
@keyframes popIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}

.kcard-top{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd)}
.kcard-title{font-size:1.05rem;font-weight:900;letter-spacing:1px}
.kcard-mode{font-size:.68rem;padding:2px 8px;border-radius:20px;font-weight:700}
.mode-ta{background:rgba(100,190,80,.15);color:var(--ac)}
.mode-dl{background:rgba(58,143,213,.15);color:var(--bl)}
.mode-tb{background:rgba(224,154,58,.15);color:var(--or)}
.kcard-timer{font-size:.9rem;font-weight:900;min-width:40px;text-align:right}
.timer-new{color:var(--ac)}
.timer-mid{color:var(--or)}
.timer-old{color:var(--dn)}

.kcard-items{padding:10px 14px;flex:1}
.kitem{padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06);display:flex;gap:10px;align-items:flex-start}
.kitem:last-child{border-bottom:none}
.kitem-idx{background:var(--s1);color:var(--mt);border:1px solid var(--bd);border-radius:5px;padding:2px 7px;font-size:.72rem;font-weight:900;flex-shrink:0;margin-top:3px;min-width:24px;text-align:center}
.kitem-info{flex:1}
.kitem-name{font-size:1rem;font-weight:800;color:var(--tx);line-height:1.2}
.kitem-opts{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.kitem-opt{background:rgba(58,143,213,.15);border:1px solid rgba(58,143,213,.35);color:#7dc4f0;border-radius:6px;padding:2px 9px;font-size:.78rem;font-weight:700}
.kitem-comment{background:rgba(200,168,75,.12);border:1px solid rgba(200,168,75,.3);border-radius:6px;padding:4px 9px;font-size:.8rem;font-weight:700;color:var(--wm);margin-top:5px;display:inline-block}

.kcard-dl{padding:6px 14px;background:rgba(58,143,213,.06);border-top:1px solid rgba(58,143,213,.1);font-size:.72rem;color:var(--bl)}

.kcard-foot{padding:10px 14px;border-top:1px solid var(--bd);display:flex;gap:7px}
.kdone{flex:1;background:linear-gradient(135deg,var(--ac),var(--ac2));border:none;border-radius:9px;padding:11px;color:#051005;font-weight:900;font-size:.9rem;cursor:pointer}
.kdone:active{transform:scale(.97)}
.kbump{background:var(--s2);border:1px solid var(--bd);border-radius:9px;padding:11px 14px;color:var(--mt);font-size:.82rem;cursor:pointer}

/* EMPTY */
#kempty{display:none;flex:1;align-items:center;justify-content:center;flex-direction:column;gap:12px}
#kempty.on{display:flex}
.kempty-icon{font-size:4rem}
.kempty-txt{font-size:1.1rem;color:var(--mt);font-weight:600}

/* DONE overlay */
.kcard.done-anim{animation:doneOut .4s ease forwards}
@keyframes doneOut{to{opacity:0;transform:scale(.88);height:0;margin:0;padding:0}}

/* Toast */
.toast{position:fixed;bottom:18px;right:18px;background:var(--ac);color:#051005;padding:9px 18px;border-radius:50px;font-size:.82rem;font-weight:700;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.on{opacity:1}
</style>
</head>
<body>

<div id="login">
  <div style="font-size:2.5rem">🦍</div>
  <div class="lbrand">NORTH APE</div>
  <div class="lsub">Kitchen Display</div>
  <div class="lcard">
    <h2>PIN</h2>
    <div class="pdisp" id="pd">----</div>
    <div class="pgrid">
      <button class="pb" onclick="pp('1')">1</button><button class="pb" onclick="pp('2')">2</button><button class="pb" onclick="pp('3')">3</button>
      <button class="pb" onclick="pp('4')">4</button><button class="pb" onclick="pp('5')">5</button><button class="pb" onclick="pp('6')">6</button>
      <button class="pb" onclick="pp('7')">7</button><button class="pb" onclick="pp('8')">8</button><button class="pb" onclick="pp('9')">9</button>
      <button class="pb pbclr" onclick="pc()">⌫</button><button class="pb" onclick="pp('0')">0</button><button class="pb pbok" onclick="pe()">✓</button>
    </div>
  </div>
</div>

<div id="kds">
  <div id="kdstop">
    <div class="kbrand">🍳 KITCHEN</div>
    <div class="kcounts">
      <div class="kcount kc-new" id="cnt-new">0 νέες</div>
      <div class="kcount kc-mid" id="cnt-mid">0 &gt;5'</div>
      <div class="kcount kc-old" id="cnt-old">0 &gt;10'</div>
    </div>
    <div class="ktime" id="ktime">00:00</div>
    <button class="ksound on" id="soundbtn" onclick="toggleSound()">🔔 Ήχος</button>
    <button class="kout" onclick="doLogout()">Έξοδος</button>
  </div>
  <div id="kboard"></div>
  <div id="kempty"><div class="kempty-icon">✅</div><div class="kempty-txt">Δεν υπάρχουν εκκρεμείς παραγγελίες</div></div>
</div>
<div class="toast" id="toast"></div>

<script>
const PIN='1234';
const FB={apiKey:"AIzaSyDAStK-oWJZyzHy4hOtv8GUlxpPyNaPgvQ",authDomain:"north-ape.firebaseapp.com",projectId:"north-ape",storageBucket:"north-ape.firebasestorage.app",messagingSenderId:"434937674645",appId:"1:434937674645:web:e3a219d4414acca94dd49c"};
firebase.initializeApp(FB);
const db=firebase.firestore();

let pin='',soundOn=true,orders={},unsubs=[];
const knownIds=new Set();

// PIN
function pp(d){if(pin.length>=4)return;pin+=d;upd();if(pin.length===4)setTimeout(pe,200)}
function pc(){pin=pin.slice(0,-1);upd()}
function upd(){document.getElementById('pd').textContent='●'.repeat(pin.length)+'-'.repeat(4-pin.length)}
function pe(){
  if(pin===PIN){
    document.getElementById('login').style.display='none';
    document.getElementById('kds').classList.add('on');
    startKDS();
  }else{
    const p=document.getElementById('pd');
    p.textContent='✕✕✕✕';p.style.color='#E05C5C';
    setTimeout(()=>{pin='';upd();p.style.color=''},800);
  }
}
function doLogout(){
  unsubs.forEach(u=>u());unsubs=[];orders={};knownIds.clear();
  document.getElementById('kds').classList.remove('on');
  document.getElementById('login').style.display='flex';
  pin='';upd();
}

function toggleSound(){
  soundOn=!soundOn;
  const b=document.getElementById('soundbtn');
  b.textContent=soundOn?'🔔 Ήχος':'🔕 Σίγαση';
  b.classList.toggle('on',soundOn);
}

function startKDS(){
  tick();setInterval(tick,15000);
  setInterval(refreshTimers,10000);

  // Table orders
  const u1=db.collection('table_orders').where('status','==','open')
    .onSnapshot(snap=>{
      snap.docChanges().forEach(ch=>{
        const d={id:ch.doc.id,...ch.doc.data()};
        if(ch.type==='removed'||d.kitchen_done){
          delete orders[d.id];
        }else{
          const isNew=!knownIds.has(d.id);
          if(isNew){knownIds.add(d.id);if(Object.keys(orders).length>0)playBeep();}
          orders[d.id]={...d,mode:'tb',arrivedAt:d.createdAt?.toDate()||new Date()};
        }
      });
      renderBoard();
    });

  // POS sales (TA + DL) — last 2 hours
  const since=new Date(Date.now()-2*3600*1000);
  const u2=db.collection('pos_sales')
    .where('timestamp','>=',since)
    .onSnapshot(snap=>{
      snap.docChanges().forEach(ch=>{
        const d={id:ch.doc.id,...ch.doc.data()};
        if(ch.type==='removed'||d.kitchen_done){delete orders[d.id];return;}
        const isNew=!knownIds.has(d.id);
        if(isNew){
          knownIds.add(d.id);
          if(Object.keys(orders).length>0)playBeep();
          orders[d.id]={...d,arrivedAt:d.timestamp?.toDate()||new Date()};
        }
      });
      renderBoard();
    });

  unsubs=[u1,u2];
}

function tick(){const n=new Date();document.getElementById('ktime').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')}

function elapsedMin(arrivedAt){return Math.floor((Date.now()-new Date(arrivedAt).getTime())/60000)}

function ageClass(min){return min>=10?'old':min>=5?'mid':'fresh'}
function timerClass(min){return min>=10?'timer-old':min>=5?'timer-mid':'timer-new'}
function fmtTime(min){return min<1?'<1\'':(min+'\'') }

function renderBoard(){
  const list=Object.values(orders);
  document.getElementById('kempty').classList.toggle('on',list.length===0);
  document.getElementById('kboard').style.display=list.length?'grid':'none';

  // Sort: oldest first
  list.sort((a,b)=>new Date(a.arrivedAt)-new Date(b.arrivedAt));

  let nNew=0,nMid=0,nOld=0;
  list.forEach(o=>{const m=elapsedMin(o.arrivedAt);if(m>=10)nOld++;else if(m>=5)nMid++;else nNew++;});
  document.getElementById('cnt-new').textContent=nNew+' νέες';
  document.getElementById('cnt-mid').textContent=nMid+' >5\'';
  document.getElementById('cnt-old').textContent=nOld+' >10\'';

  document.getElementById('kboard').innerHTML=list.map(o=>cardHTML(o)).join('');
}

function refreshTimers(){
  Object.values(orders).forEach(o=>{
    const el=document.querySelector('[data-oid="'+o.id+'"]');
    if(!el)return;
    const min=elapsedMin(o.arrivedAt);
    const age=ageClass(min);
    el.className='kcard '+age;
    const t=el.querySelector('.kcard-timer');
    if(t){t.textContent=fmtTime(min);t.className='kcard-timer '+timerClass(min);}
  });
  let nNew=0,nMid=0,nOld=0;
  Object.values(orders).forEach(o=>{const m=elapsedMin(o.arrivedAt);if(m>=10)nOld++;else if(m>=5)nMid++;else nNew++;});
  document.getElementById('cnt-new').textContent=nNew+' νέες';
  document.getElementById('cnt-mid').textContent=nMid+' >5\'';
  document.getElementById('cnt-old').textContent=nOld+' >10\'';
}

function cardHTML(o){
  const min=elapsedMin(o.arrivedAt);
  const age=ageClass(min);
  const items=o.items||[];
  const modeLabel=o.mode==='ta'?'🥡 Take Away':o.mode==='dl'?'🚚 Delivery':'🪑 '+(o.tableName||o.tableKey||'Τραπέζι');
  const modeCls=o.mode==='ta'?'mode-ta':o.mode==='dl'?'mode-dl':'mode-tb';
  const dlHTML=o.delivery?`<div class="kcard-dl">📞 ${o.delivery.name||''} ${o.delivery.phone||''} ${o.delivery.addr?'· '+o.delivery.addr:''}</div>`:'';
  // Expand each item into individual rows (one per unit)
  let rowIdx=0;
  const rows=[];
  items.forEach(it=>{
    const qty=it.qty||1;
    for(let q=0;q<qty;q++){
      rowIdx++;
      // Parse opts string into individual badges
      const optBadges=(it.opts||'').split(/[·|,]/).map(s=>s.trim()).filter(Boolean)
        .map(s=>'<span class="kitem-opt">'+s+'</span>').join('');
      const cmtHTML=it.comment?'<div class="kitem-comment">📝 '+it.comment+'</div>':'';
      rows.push(
        '<div class="kitem">'+
          '<div class="kitem-idx">'+rowIdx+'</div>'+
          '<div class="kitem-info">'+
            '<div class="kitem-name">'+(it.emoji||'')+' '+it.name+'</div>'+
            (optBadges?'<div class="kitem-opts">'+optBadges+'</div>':'')+
            cmtHTML+
          '</div>'+
        '</div>'
      );
    }
  });
  const itemsHTML=rows.join('');
  return `<div class="kcard ${age}" data-oid="${o.id}">
    <div class="kcard-top">
      <div class="kcard-title">${modeLabel}</div>
      <span class="kcard-mode ${modeCls}">${rows.length} τεμ.</span>
      <div class="kcard-timer ${timerClass(min)}">${fmtTime(min)}</div>
    </div>
    <div class="kcard-items">${itemsHTML}</div>
    ${dlHTML}
    <div class="kcard-foot">
      <button class="kbump" onclick="bumpOrder('${o.id}')">⏸ Αναβολή</button>
      <button class="kdone" onclick="doneOrder('${o.id}')">✅ Έτοιμο</button>
    </div>
  </div>`;
}

async function doneOrder(id){
  const o=orders[id];if(!o)return;
  // Animate out
  const el=document.querySelector('[data-oid="'+id+'"]');
  if(el){el.classList.add('done-anim');await new Promise(r=>setTimeout(r,380));}
  delete orders[id];
  // Mark in Firebase
  try{
    const col=o.mode==='tb'?'table_orders':'pos_sales';
    await db.collection(col).doc(id).update({kitchen_done:true,kitchen_doneAt:firebase.firestore.FieldValue.serverTimestamp()});
  }catch(e){}
  renderBoard();
  toast('✅ Έτοιμο!');
}

function bumpOrder(id){
  // Move to bottom (re-stamp arrivedAt to now so it goes last)
  if(orders[id])orders[id].arrivedAt=new Date();
  renderBoard();
}

function playBeep(){
  if(!soundOn)return;
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,150,300].forEach((t,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=i===2?880:660;
      g.gain.setValueAtTime(.4,ctx.currentTime+t/1000);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t/1000+.15);
      o.start(ctx.currentTime+t/1000);o.stop(ctx.currentTime+t/1000+.2);
    });
  }catch(e){}
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),1500)}
</script>
</body>
</html>
