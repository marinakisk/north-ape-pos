const NAME_OPTS={};
let cats=[],prods=[],fbOpts=[],areas=[],tables={};
let curCat='',curMode='ta',curArea='',selTable=null;
let cart=[],pay='cash',payModal='cash';
let tableOrders={};
let mItem=null,mSel={},mMulti={},mQty=1;
let pin='';
// PIN
function pp(d){if(pin.length>=4)return;pin+=d;upd();if(pin.length===4)setTimeout(pe,200);}
function pc(){pin=pin.slice(0,-1);upd();}
function upd(){document.getElementById('pd').textContent='●'.repeat(pin.length)+'-'.repeat(4-pin.length);}
function pe(){
  if(pin===PIN){
    document.getElementById('login').style.display='none';
    document.getElementById('pos').classList.add('on');
    startPos();
  }else{
    const pd=document.getElementById('pd');
    pd.textContent='✕✕✕✕';pd.style.color='var(--dn)';
    setTimeout(()=>{pin='';upd();pd.style.color='';},800);
  }
}
function logout(){
  document.getElementById('pos').classList.remove('on');
  document.getElementById('login').style.display='flex';
  pin='';upd();
}
function startPos(){
  setMode('ta');tick();setInterval(tick,10000);loadFB();loadTables();
}
function tick(){const n=new Date();document.getElementById('ht').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}
// MODE
function setMode(m){
  curMode=m;
  // Update buttons
  ['ta','dl','tb'].forEach(x=>{
    const b=document.getElementById('btn-'+x);
    b.className='mode-btn'+(x===m?' on-'+x:'');
  });
  document.getElementById('main').className='mode-'+m;
  // Show/hide right panels
  document.getElementById('cart-view').classList.toggle('on',m!=='tb');
  document.getElementById('tables-view').classList.toggle('on',m==='tb');
  document.getElementById('table-order').classList.remove('on');
  if(m==='tb'){document.getElementById('tables-view').classList.add('on');}
  // Update cart title
  const titles={ta:'🥡 Take Away',dl:'🚚 Delivery',tb:'🪑 Τραπέζια'};
  document.getElementById('cart-title').textContent=titles[m]||'';
  // Re-render products filtered by mode
  renderProds();
  if(m==='tb')renderTables();
}
// FIREBASE
async function loadFB(){
  try{
    const [cs,ps,os]=await Promise.all([
      db.collection('menu_cats').get(),
      db.collection('menu_products').get(),
      db.collection('menu_opts').get(),
    ]);
    const fc=[];cs.forEach(d=>fc.push({id:d.id,...d.data()}));
    fc.sort((a,b)=>(a.order||0)-(b.order||0));
    const fp=[];ps.forEach(d=>fp.push({id:d.id,...d.data()}));
    fp.sort((a,b)=>(a.order||0)-(b.order||0));
    const fo=[];os.forEach(d=>fo.push({id:d.id,...d.data()}));
    fo.sort((a,b)=>(a.order||0)-(b.order||0));
    if(fc.length){cats=fc;curCat=fc[0].id;}
    if(fp.length)prods=fp;
    if(fo.length)fbOpts=fo;
    renderCats();renderProds();
    // Live
    db.collection('menu_cats').onSnapshot(s=>{const f=[];s.forEach(d=>f.push({id:d.id,...d.data()}));f.sort((a,b)=>(a.order||0)-(b.order||0));if(f.length){cats=f;renderCats();}});
    db.collection('menu_products').onSnapshot(s=>{const f=[];s.forEach(d=>f.push({id:d.id,...d.data()}));f.sort((a,b)=>(a.order||0)-(b.order||0));if(f.length){prods=f;renderProds();}});
    db.collection('menu_opts').onSnapshot(s=>{fbOpts=[];s.forEach(d=>fbOpts.push({id:d.id,...d.data()}));fbOpts.sort((a,b)=>(a.order||0)-(b.order||0));});
  }catch(e){console.warn('FB:',e);}
}
async function loadTables(){
  try{
    const snap=await db.collection('pos_areas').get();
    areas=[];
    snap.forEach(d=>areas.push({id:d.id,...d.data()}));
    areas.sort((a,b)=>(a.order||0)-(b.order||0));
    if(!areas.length){
      // Create default areas
      await db.collection('pos_areas').add({name:'Σαλόνι',order:0,tables:['Τ1','Τ2','Τ3','Τ4','Τ5']});
      await loadTables(); return;
    }
    if(areas.length)curArea=areas[0].id;
    // Load open table orders
    const oSnap=await db.collection('table_orders').where('status','==','open').get();
    tableOrders={};
    oSnap.forEach(d=>{tableOrders[d.data().tableKey]={id:d.id,...d.data()};});
    renderAreaTabs();renderTables();
    // Live listener for table orders
    db.collection('table_orders').where('status','==','open').onSnapshot(s=>{
      tableOrders={};
      s.forEach(d=>{tableOrders[d.data().tableKey]={id:d.id,...d.data()};});
      renderTables();
      if(selTable)renderTableOrder();
    });
  }catch(e){console.warn('Tables:',e);}
}
// AREAS & TABLES
function renderAreaTabs(){
  document.getElementById('area-tabs').innerHTML=areas.map(a=>
    '<div class="area-tab'+(curArea===a.id?' on':'')+'" onclick="selArea(\''+a.id+'\')">'+a.name+'</div>'
  ).join('')+'<div class="area-tab" onclick="addArea()" style="color:var(--ac)">+ Περιοχή</div>';
}
function selArea(id){curArea=id;renderAreaTabs();renderTables();}
async function addArea(){
  const name=prompt('Όνομα νέας περιοχής:');
  if(!name)return;
  const ref=await db.collection('pos_areas').add({name,order:areas.length,tables:[]});
  areas.push({id:ref.id,name,order:areas.length,tables:[]});
  curArea=ref.id;
  renderAreaTabs();renderTables();
}
function renderTables(){
  const area=areas.find(a=>a.id===curArea);
  if(!area){document.getElementById('tables-grid').innerHTML='<div style="color:var(--mt);padding:20px;text-align:center">Δεν υπάρχουν περιοχές</div>';return;}
  const tbls=area.tables||[];
  document.getElementById('tables-grid').innerHTML=
    tbls.map(t=>{
      const key=curArea+'_'+t;
      const order=tableOrders[key];
      const isOpen=!!order;
      const isSel=selTable===key;
      const total=isOpen?(order.items||[]).reduce((s,i)=>s+(i.price+i.extra)*i.qty,0):0;
      const cnt=isOpen?(order.items||[]).reduce((s,i)=>s+i.qty,0):0;
      return '<div class="tbl'+(isSel?' sel':isOpen?' open':'')+'" onclick="selectTable(\''+key+'\',\''+t+'\')">'+
        '<div class="tbl-nm">'+t+'</div>'+
        (isOpen?'<div class="tbl-tot">'+total.toFixed(2).replace('.',',')+'€</div><div class="tbl-cnt">'+cnt+' τεμ.</div>':'<div class="tbl-cnt" style="color:var(--ac)">Ελεύθερο</div>')+
      '</div>';
    }).join('')+
    '<div class="tbl" style="border-style:dashed;cursor:pointer;color:var(--ac)" onclick="addTable()">'+
      '<div style="font-size:1.2rem">+</div><div class="tbl-nm" style="color:var(--ac)">Τραπέζι</div>'+
    '</div>';
}
async function deleteTable(name){
  if(!confirm('Διαγραφή τραπεζιού "'+name+'";'))return;
  const area=areas.find(a=>a.id===curArea);
  if(!area)return;
  area.tables=area.tables.filter(t=>t!==name);
  await db.collection('pos_areas').doc(curArea).update({tables:area.tables});
  renderTables();
  toast('🗑️ Διαγράφηκε!');
}
async function addTable(){
  const area=areas.find(a=>a.id===curArea);
  if(!area)return;
  const name=prompt('Όνομα τραπεζιού (π.χ. Τ6, Πάσο 1):');
  if(!name)return;
  area.tables=area.tables||[];
  area.tables.push(name);
  await db.collection('pos_areas').doc(curArea).update({tables:area.tables});
  renderTables();
}
function selectTable(key,name){
  selTable=key;
  document.getElementById('tables-view').classList.remove('on');
  document.getElementById('table-order').classList.add('on');
  document.getElementById('to-title').textContent='🪑 '+name;
  renderTableOrder();
}
function backToTables(){
  selTable=null;
  document.getElementById('table-order').classList.remove('on');
  document.getElementById('tables-view').classList.add('on');
  renderTables();
}
function renderTableOrder(){
  const order=tableOrders[selTable];
  const items=order?order.items||[]:[];
  const el=document.getElementById('to-items');
  if(!items.length){el.innerHTML='<div class="to-empty">Δεν υπάρχουν παραγγελίες<br><small style="color:var(--mt)">Επίλεξε προϊόντα από τον κατάλογο</small></div>';}
  else{
    el.innerHTML=items.map((it,i)=>
      '<div class="to-row">'+
        '<span style="font-size:1.1rem">'+it.emoji+'</span>'+
        '<div class="to-info"><div class="to-nm">'+it.name+'</div>'+(it.opts?'<div class="to-opts">'+it.opts+'</div>':'')+
        (it.comment?'<div class="to-opts">📝 '+it.comment+'</div>':'')+'</div>'+
        '<div class="qc"><button class="qb" onclick="chTblQty('+i+',-1)">−</button><span class="qn">'+it.qty+'</span><button class="qb" onclick="chTblQty('+i+',1)">+</button></div>'+
        '<div class="to-pr">'+((it.price+it.extra)*it.qty).toFixed(2).replace('.',',')+'€</div>'+
      '</div>'
    ).join('');
  }
  const total=items.reduce((s,i)=>s+(i.price+i.extra)*i.qty,0);
  document.getElementById('to-tv').textContent=total.toFixed(2).replace('.',',')+'€';
}
async function chTblQty(i,d){
  const order=tableOrders[selTable];
  if(!order)return;
  order.items[i].qty=Math.max(0,order.items[i].qty+d);
  if(order.items[i].qty===0)order.items.splice(i,1);
  await db.collection('table_orders').doc(order.id).update({items:order.items});
  renderTableOrder();renderTables();
}
async function addToTable(item,opts,comment,qty,extra,vat,basePrice){
  const order=tableOrders[selTable];
  const newItem={id:item.id,name:item.name,emoji:item.emoji,price:basePrice||parseFloat(item.price)||0,extra,opts,comment,qty,vat:vat||24};
  if(order){
    order.items.push(newItem);
    await db.collection('table_orders').doc(order.id).update({items:order.items,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
  }else{
    const ref=await db.collection('table_orders').add({
      tableKey:selTable,tableName:document.getElementById('to-title').textContent.replace('🪑 ',''),
      status:'open',items:[newItem],
      createdAt:firebase.firestore.FieldValue.serverTimestamp(),
      updatedAt:firebase.firestore.FieldValue.serverTimestamp(),
    });
    tableOrders[selTable]={id:ref.id,tableKey:selTable,status:'open',items:[newItem]};
  }
  renderTableOrder();renderTables();
  toast('✅ Προστέθηκε!');
}
function printPreReceipt(){
  const order=tableOrders[selTable];
  if(!order||!order.items.length){toast('⚠️ Δεν υπάρχουν παραγγελίες');return;}
  const total=order.items.reduce((s,i)=>s+(i.price+i.extra)*i.qty,0);
  const n=new Date();
  let r='================================\n';
  r+='        NORTH APE\n';
  r+='     Σταμάτα Αττικής\n';
  r+='================================\n';
  r+=document.getElementById('to-title').textContent+'\n';
  r+=n.toLocaleDateString('el-GR')+'  '+n.toLocaleTimeString('el-GR',{hour:'2-digit',minute:'2-digit'})+'\n';
  r+='---- ΠΡΟΣΩΡΙΝΗ ΑΠΟΔΕΙΞΗ --------\n';
  order.items.forEach(it=>{
    r+=it.emoji+' '+it.name+' x'+it.qty+'\n';
    if(it.opts)r+='   '+it.opts+'\n';
    r+='   '+((it.price+it.extra)*it.qty).toFixed(2)+'€\n';
  });
  r+='================================\n';
  r+='ΣΥΝΟΛΟ: '+total.toFixed(2)+'€\n';
  r+='================================\n';
  r+='   (ΠΡΟΣΩΡΙΝΗ - ΔΕΝ ΙΣΧΥΕΙ)\n';
  const w=window.open('','_blank','width=350,height=500');
  w.document.write('<html><head><title>Προσ. Απόδειξη</title><style>body{font-family:monospace;font-size:13px;white-space:pre;padding:10px;}</style></head><body>'+r+'</body></html>');
  w.document.close();setTimeout(()=>w.print(),400);
}
function openPayModal(){
  const order=tableOrders[selTable];
  if(!order||!order.items.length){toast('⚠️ Δεν υπάρχουν παραγγελίες');return;}
  const total=order.items.reduce((s,i)=>s+(i.price+i.extra)*i.qty,0);
  document.getElementById('pay-total-val').textContent=total.toFixed(2).replace('.',',')+'€';
  payModal='cash';
  ['cash','card','account'].forEach(x=>document.getElementById('pm-'+x).classList.toggle('on',x==='cash'));
  document.getElementById('pay-modal').classList.add('on');
}
function selPayModal(t){
  payModal=t;
  ['cash','card','account'].forEach(x=>document.getElementById('pm-'+x).classList.toggle('on',x===t));
}
async function confirmTablePay(){
  const order=tableOrders[selTable];
  if(!order)return;
  const total=order.items.reduce((s,i)=>s+(i.price+i.extra)*i.qty,0);
  // Print receipt
  printFinalReceipt(order,total);
  // Close order in Firebase
  await db.collection('table_orders').doc(order.id).update({
    status:'closed',
    payment:payModal==='cash'?'Μετρητά':payModal==='card'?'Κάρτα':'Λογαριασμός',
    closedAt:firebase.firestore.FieldValue.serverTimestamp(),
    total,
  });
  delete tableOrders[selTable];
  document.getElementById('pay-modal').classList.remove('on');
  flash();
  backToTables();
}
function printFinalReceipt(order,total){
  const n=new Date();
  const payLbl=payModal==='cash'?'Μετρητά':payModal==='card'?'Κάρτα':'Λογαριασμός';
  let r='================================\n        NORTH APE\n     Σταμάτα Αττικής\n================================\n';
  r+=document.getElementById('to-title').textContent+'\n';
  r+=n.toLocaleDateString('el-GR')+'  '+n.toLocaleTimeString('el-GR',{hour:'2-digit',minute:'2-digit'})+'\n';
  r+='--------------------------------\n';
  order.items.forEach(it=>{
    r+=it.emoji+' '+it.name+' x'+it.qty+'\n';
    if(it.opts)r+='   '+it.opts+'\n';
    r+='   '+((it.price+it.extra)*it.qty).toFixed(2)+'€  ΦΠΑ '+it.vat+'%\n';
  });
  r+='================================\nΣΥΝΟΛΟ: '+total.toFixed(2)+'€\nΠΛΗΡΩΜΗ: '+payLbl+'\n================================\n   Σας ευχαριστούμε! 🦍\n================================\n';
  const w=window.open('','_blank','width=350,height:500');
  w.document.write('<html><head><title>Απόδειξη</title><style>body{font-family:monospace;font-size:13px;white-space:pre;padding:10px;}</style></head><body>'+r+'</body></html>');
  w.document.close();setTimeout(()=>w.print(),400);
}
async function closeTable(){
  if(!confirm('Κλείσιμο τραπεζιού χωρίς πληρωμή;'))return;
  const order=tableOrders[selTable];
  if(order){
    await db.collection('table_orders').doc(order.id).update({status:'cancelled',closedAt:firebase.firestore.FieldValue.serverTimestamp()});
    delete tableOrders[selTable];
  }
  backToTables();
}
// CATS & PRODS
function renderCats(){
  document.getElementById('cats').innerHTML=cats.filter(c=>c.visible!==false).map(c=>
    '<div class="ci'+(curCat===c.id?' on':'')+'" onclick="selCat(\''+c.id+'\')"><span class="ci-em">'+c.emoji+'</span><span class="ci-nm">'+c.name+'</span></div>'
  ).join('');
}
function selCat(id){curCat=id;renderCats();renderProds();}
function getProductModes(p){
  // Check if product has mode assignments
  const modes=p.modes||{ta:true,dl:true,tb:true};
  return modes;
}
function renderProds(){
  const items=prods.filter(p=>{
    if(p.catId!==curCat)return false;
    if(p.active===false)return false;
    const modes=p.modes||{ta:true,dl:true,tb:true};
    return modes[curMode]!==false;
  });
  document.getElementById('prods').innerHTML=items.map(p=>{
    let inCart=0;
    if(curMode==='tb'&&selTable){
      const order=tableOrders[selTable];
      inCart=order?(order.items||[]).filter(i=>i.id===p.id).reduce((s,i)=>s+i.qty,0):0;
    }else{
      inCart=cart.filter(c=>c.id===p.id).reduce((s,c)=>s+c.qty,0);
    }
    const vat=curMode==='tb'?(p.vatTb||24):(p.vatTa||13);
    return '<div class="pc'+(inCart>0?' in':'')+'" onclick="openModal(\''+p.id+'\')">'+
      (inCart>0?'<div class="pc-bdg">'+inCart+'</div>':'')+
      '<div class="pc-em">'+p.emoji+'</div>'+
      '<div class="pc-nm">'+p.name+'</div>'+
      '<div class="pc-pr">'+parseFloat(p.price||0).toFixed(2).replace('.',',')+'€</div>'+
      '<div class="pc-vat">ΦΠΑ '+vat+'%</div>'+
    '</div>';
  }).join('')||'<div style="grid-column:1/-1;text-align:center;color:var(--mt);padding:40px">Κανένα προϊόν για αυτό το mode</div>';
}
// OPTIONS MODAL
function getOpts(id,name){
  // Try by product ID first
  let fb=fbOpts.filter(og=>(og.products||[]).includes(id));
  if(fb.length){fb.sort((a,b)=>(a.order||0)-(b.order||0));return fb;}
  // Try by name match
  const n=(name||'').toLowerCase().trim();
  fb=fbOpts.filter(og=>(og.products||[]).some(pid=>{
    const p=prods.find(x=>x.id===pid);
    return p&&(p.name||'').toLowerCase()===n;
  }));
  fb.sort((a,b)=>(a.order||0)-(b.order||0));
  return fb;
}
function openModal(id){
  mItem=prods.find(p=>p.id===id);if(!mItem)return;
  mQty=1;mSel={};mMulti={};
  const opts=getOpts(id,mItem.name);
  opts.forEach(og=>{if(og.type==='radio'){const d=og.choices.find(c=>c.default);if(d)mSel[og.name]=d.label;}else mMulti[og.name]=[];});
  const mp=curMode==='ta'?(mItem.priceTa||mItem.price):curMode==='dl'?(mItem.priceDl||mItem.price):(mItem.priceTb||mItem.price);
  document.getElementById('m-title').textContent=mItem.name;
  document.getElementById('m-price').textContent='Από '+parseFloat(mp||0).toFixed(2).replace('.',',')+'€';
  document.getElementById('m-comment').value='';
  document.getElementById('mqn').textContent='1';
  renderMOpts();updateMBtn();
  document.getElementById('modal-bg').classList.add('on');
}
function renderMOpts(){
  const opts=getOpts(mItem.id,mItem.name);
  document.getElementById('m-opts').innerHTML=opts.map(og=>{
    const pills=og.choices.map(ch=>{
      const sel=og.type==='radio'?mSel[og.name]===ch.label:(mMulti[og.name]||[]).includes(ch.label);
      const fn=og.type==='radio'?'sOpt("'+og.name+'","'+ch.label+'")'  :'tOpt("'+og.name+'","'+ch.label+'")';
      const ex=ch.extra?'<span class="pill-extra">+'+parseFloat(ch.extra).toFixed(2).replace('.',',')+'€</span>':'';
      return '<div class="pill'+(sel?' on':'')+'" onclick="'+fn+'"><div class="pill-chk">'+(sel?'✓':'')+'</div>'+ch.label+ex+'</div>';
    }).join('');
    return '<div class="og"><div class="og-lbl">'+og.name+(og.required?'<span class="req-badge">Υποχρεωτικό</span>':'')+' </div><div class="og-pills">'+pills+'</div></div>';
  }).join('');
}
function sOpt(g,l){mSel[g]=l;renderMOpts();updateMBtn();}
function tOpt(g,l){if(!mMulti[g])mMulti[g]=[];const i=mMulti[g].indexOf(l);if(i>=0)mMulti[g].splice(i,1);else mMulti[g].push(l);renderMOpts();updateMBtn();}
function mqty(d){mQty=Math.max(1,mQty+d);document.getElementById('mqn').textContent=mQty;updateMBtn();}
function calcExtra(){
  let e=0;
  getOpts(mItem.id,mItem.name).forEach(og=>{
    if(og.type==='radio'){const s=og.choices.find(c=>c.label===mSel[og.name]);if(s&&s.extra)e+=s.extra;}
    else(mMulti[og.name]||[]).forEach(l=>{const s=og.choices.find(c=>c.label===l);if(s&&s.extra)e+=s.extra;});
  });
  return e;
}
function getModePrice(item){
  // Use mode-specific price if set, otherwise fall back to base price
  const p=item.price||0;
  if(curMode==='ta') return parseFloat(item.priceTa)||parseFloat(p)||0;
  if(curMode==='dl') return parseFloat(item.priceDl)||parseFloat(p)||0;
  return parseFloat(item.priceTb)||parseFloat(p)||0;
}
function getModeVat(item){
  return curMode==='tb'?(item.vatTb||24):curMode==='dl'?(item.vatDl||13):(item.vatTa||13);
}
function updateMBtn(){
  const t=(getModePrice(mItem)+calcExtra())*mQty;
  document.getElementById('m-add').textContent='Προσθήκη — '+t.toFixed(2).replace('.',',')+'€';
}
function addFromModal(){
  const ex=calcExtra();
  const ro=Object.entries(mSel).map(([g,v])=>v).join(' · ');
  const mo=Object.entries(mMulti).flatMap(([g,vs])=>vs).join(', ');
  const optStr=[ro,mo].filter(Boolean).join(' | ');
  const comment=document.getElementById('m-comment').value.trim();
  const vat=getModeVat(mItem);
  const basePrice=getModePrice(mItem);
  closeModal();
  if(curMode==='tb'&&selTable){
    addToTable(mItem,optStr,comment,mQty,ex,vat,basePrice);
  }else{
    cart.push({id:mItem.id,name:mItem.name,emoji:mItem.emoji,basePrice,extra:ex,opts:optStr,comment,qty:mQty,vat});
    renderCart();renderProds();toast('✅ Προστέθηκε!');
  }
}
function closeModal(){document.getElementById('modal-bg').classList.remove('on');}
document.getElementById('modal-bg').addEventListener('click',e=>{if(e.target===document.getElementById('modal-bg'))closeModal();});
// CART
function renderCart(){
  const el=document.getElementById('cl');
  if(!cart.length){el.innerHTML='<div class="cart-empty">Επίλεξε προϊόντα →</div>';updTot();return;}
  el.innerHTML=cart.map((c,i)=>
    '<div class="cr"><span style="font-size:1.1rem">'+c.emoji+'</span>'+
    '<div class="cr-info"><div class="cr-nm">'+c.name+'</div>'+(c.opts?'<div class="cr-opts">'+c.opts+'</div>':'')+(c.comment?'<div class="cr-opts">📝 '+c.comment+'</div>':'')+'</div>'+
    '<div class="qc"><button class="qb" onclick="cq('+i+',-1)">−</button><span class="qn">'+c.qty+'</span><button class="qb" onclick="cq('+i+',1)">+</button></div>'+
    '<div class="cr-pr">'+((c.basePrice+c.extra)*c.qty).toFixed(2).replace('.',',')+'€</div></div>'
  ).join('');
  updTot();
}
function cq(i,d){cart[i].qty=Math.max(0,cart[i].qty+d);if(cart[i].qty===0)cart.splice(i,1);renderCart();renderProds();}
function clrCart(){cart=[];renderCart();renderProds();}
function selPay(t){pay=t;['cash','card','account'].forEach(x=>document.getElementById('p-'+x).classList.toggle('on',x===t));}
function updTot(){
  const t=cart.reduce((s,c)=>s+(c.basePrice+c.extra)*c.qty,0);
  document.getElementById('tv').textContent=t.toFixed(2).replace('.',',')+'€';
  document.getElementById('okb').disabled=cart.length===0;
}
async function checkout(){
  const total=cart.reduce((s,c)=>s+(c.basePrice+c.extra)*c.qty,0);
  const payLbl=pay==='cash'?'Μετρητά':pay==='card'?'Κάρτα':'Λογαριασμός';
  // Print
  const n=new Date();
  let r='================================\n        NORTH APE\n     Σταμάτα Αττικής\n================================\n';
  r+=(curMode==='ta'?'TAKE AWAY':'DELIVERY')+'\n';
  r+=n.toLocaleDateString('el-GR')+'  '+n.toLocaleTimeString('el-GR',{hour:'2-digit',minute:'2-digit'})+'\n';
  r+='--------------------------------\n';
  cart.forEach(c=>{r+=c.emoji+' '+c.name+' x'+c.qty+'\n';if(c.opts)r+='   '+c.opts+'\n';r+='   '+((c.basePrice+c.extra)*c.qty).toFixed(2)+'€\n';});
  r+='================================\nΣΥΝΟΛΟ: '+total.toFixed(2)+'€\nΠΛΗΡΩΜΗ: '+payLbl+'\n================================\n   Σας ευχαριστούμε! 🦍\n================================\n';
  const w=window.open('','_blank','width=350,height=500');
  w.document.write('<html><head><title>Απόδειξη</title><style>body{font-family:monospace;font-size:13px;white-space:pre;padding:10px;}</style></head><body>'+r+'</body></html>');
  w.document.close();setTimeout(()=>w.print(),400);
  flash();cart=[];renderCart();renderProds();
}
async function openCashRegister(){
  document.getElementById('cash-modal').style.display='flex';
  await loadCashRegister();
}
async function loadCashRegister(){
  const el=document.getElementById('cash-content');
  el.innerHTML='<div style="text-align:center;color:#5A7050;padding:20px">Φόρτωση...</div>';
  try{
    const today=new Date();
    today.setHours(0,0,0,0);
    const snap=await db.collection('table_orders')
      .where('status','==','closed')
      .get();
    let cash=0,card=0,account=0,total=0;
    snap.forEach(d=>{
      const data=d.data();
      const closed=data.closedAt?data.closedAt.toDate():new Date(0);
      if(closed<today)return;
      const t=data.total||0;
      total+=t;
      if(data.payment==='Μετρητά')cash+=t;
      else if(data.payment==='Κάρτα')card+=t;
      else account+=t;
    });
    // Also count Take Away / Delivery from pos_sales if exists
    el.innerHTML=
      '<div style="display:flex;flex-direction:column;gap:8px;">'+
      row('💵 Μετρητά',cash)+
      row('💳 Κάρτα',card)+
      row('📋 Λογαριασμός',account)+
      '<div style="height:1px;background:rgba(80,160,80,.2);margin:4px 0;"></div>'+
      row('🏆 Σύνολο',total,true)+
      '</div>';
  }catch(e){el.innerHTML='<div style="color:#E05C5C;padding:20px">Σφάλμα: '+e.message+'</div>';}
}
function row(label,amount,bold){
  return '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#162016;border-radius:10px;border:1px solid rgba(80,160,80,.1);">'+
    '<span style="font-size:.88rem;'+(bold?'font-weight:700;color:#E8F0E0':'color:#5A7050')+'">'+label+'</span>'+
    '<span style="font-family:Bebas Neue,sans-serif;font-size:1.3rem;color:'+(bold?'#6DBF5A':'#C8A84B')+'">'+amount.toFixed(2).replace('.',',')+'€</span>'+
  '</div>';
}
async function closeDayRegister(){
  if(!confirm('Κλείσιμο ημέρας; Θα εκτυπωθεί αναφορά.'))return;
  await loadCashRegister();
  const el=document.getElementById('cash-content');
  const n=new Date();
  let r='================================\n        NORTH APE\n================================\n';
  r+='ΗΜΕΡΗΣΙΟ ΤΑΜΕΙΟ\n';
  r+=n.toLocaleDateString('el-GR')+'\n';
  r+='================================\n';
  r+=el.innerText.replace(/\n+/g,'\n');
  r+='================================\n   Τέλος Ημέρας\n================================\n';
  const w=window.open('','_blank','width=350,height=400');
  w.document.write('<html><head><title>Ταμείο</title><style>body{font-family:monospace;font-size:13px;white-space:pre;padding:10px;}</style></head><body>'+r+'</body></html>');
  w.document.close();setTimeout(()=>w.print(),400);
  document.getElementById('cash-modal').style.display='none';
}
function flash(){const f=document.getElementById('flash');f.classList.add('on');setTimeout(()=>f.classList.remove('on'),1500);}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),1500);}

</script>
